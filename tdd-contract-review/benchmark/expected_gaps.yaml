# Expected gaps for tdd-contract-review benchmark
#
# Keyed by unit-slug. When you run /tdd-contract-review on a unit, eval.sh compares
# the produced findings.json against the list here.
#
# Matching: eval.sh looks for each `match` pattern (substring, case-insensitive) in
# the findings.json entries' field + description. If any gap row has a matching entry
# at the expected priority, it counts as FOUND. Otherwise MISSING.
#
# Coverage: 5 units across the sample app exercising create/read/update patterns
# and critical-mode auto-detection:
#   post-api-v1-transactions   — richest unit, full pipeline, known 17+21 gaps
#   post-api-v1-wallets        — critical-lite, exercises Wallet model validation gaps
#   patch-api-v1-wallets       — no tests at all; headline data-leak + mass-assignment
#   get-api-v1-transactions    — list read; pagination / filter / ordering gaps
#   get-api-v1-transactions-id — single read; IDOR on non-create endpoint
#
# See test-plan.md for the full eval design (Category A is graded by this file,
# Category B by structural_check.sh).

units:
  post-api-v1-transactions:
    source_file: app/controllers/api/v1/transactions_controller.rb
    method: create
    critical: true
    gaps:
      # Known gaps (from results.md, rows 1-17)
      - id: G1
        priority: HIGH
        match: ["happy path", "response field", "assertion"]
        description: Happy path assertions incomplete
      - id: G2
        priority: HIGH
        match: ["PaymentGateway", "external API", "outbound"]
        description: No PaymentGateway external API scenarios
      - id: G4
        priority: HIGH
        match: ["wallet", "another user", "IDOR"]
        description: No wallet-belongs-to-another-user test
      - id: G5
        priority: HIGH
        match: ["suspended", "closed", "wallet status"]
        description: No suspended/closed wallet scenarios
      - id: G6
        priority: MEDIUM
        match: ["currency mismatch", "currency"]
        description: No currency mismatch test
      - id: G7
        priority: MEDIUM
        match: ["description", "category"]
        description: Missing description/category assertions
      - id: G10
        priority: MEDIUM
        match: ["boundary", "amount=0", "zero", "max amount"]
        description: Missing boundary cases (amount=0, max)
      - id: G14
        priority: HIGH
        match: ["insufficient balance", "amount > balance"]
        description: No insufficient balance test
      - id: G15
        priority: MEDIUM
        match: ["exact balance", "amount == balance", "zero balance"]
        description: No exact balance test
      - id: G17
        priority: HIGH
        match: ["data leak", "error response leaks", "balance leaked"]
        description: Error response leaks balance/user_id

      # Critical-mode gaps (from results.md, F1-F21 — money-correctness + security)
      - id: F2
        priority: HIGH
        match: ["precision overflow", "decimal precision", "9+ decimal", "scale:8", "decimal(20,8)", "beyond scale"]
        description: No precision overflow test
      - id: F3
        priority: MEDIUM
        match: ["zero amount"]
        description: No zero amount test
      - id: F4
        priority: MEDIUM
        match: ["max amount", "1M boundary", "1_000_000"]
        description: No max amount (1M) boundary test
      - id: F5
        priority: MEDIUM
        match: ["over-max", "1M+1", "above max", "just-over", "exceeds 1_000_000", "greater than 1_000_000", "1_000_000.00000001", "regulatory limit"]
        description: No over-max (1M+1) test
      - id: F6
        priority: HIGH
        match: ["idempotency", "idempotent"]
        description: No idempotency key on POST
      - id: F7
        priority: HIGH
        match: ["state machine", "transition", "status transition"]
        description: Transaction state transitions untested
      - id: F8
        priority: HIGH
        match: ["invalid transition", "illegal transition"]
        description: No invalid transition test
      - id: F10
        priority: HIGH
        match: ["TOCTOU", "race condition", "concurrent"]
        description: TransactionService TOCTOU risk
      - id: F11
        priority: HIGH
        match: ["concurrent debit", "concurrent transfer", "concurrent withdraw"]
        description: No concurrent debit test
      - id: F12
        priority: MEDIUM
        match: ["double-submit", "double submit", "duplicate request", "duplicate transaction", "duplicate charge", "retried http post", "retry creates"]
        description: No double-submit prevention
      - id: F13
        priority: HIGH
        match: ["missing token", "no auth", "401"]
        description: No auth tests (missing token → 401)
      - id: F14
        priority: HIGH
        match: ["IDOR", "other user's transaction", "another user's transaction"]
        description: IDOR — other user's transaction
      - id: F16
        priority: MEDIUM
        match: ["rate limit", "rate limiting", "throttle", "rack::attack", "request budget", "velocity limit"]
        description: No rate limiting
      - id: F18
        priority: MEDIUM
        match: ["audit trail", "audit log"]
        description: No audit trail fields

  post-api-v1-wallets:
    source_file: app/controllers/api/v1/wallets_controller.rb
    method: create
    critical: true
    gaps:
      - id: W1
        priority: HIGH
        match: ["duplicate currency", "uniqueness", "already exists"]
        description: No duplicate-currency-per-user test (unique index scope)
      - id: W2
        priority: MEDIUM
        match: ["name too long", "length", "maximum: 100", "101", "name > 100"]
        description: No name length boundary test (> 100 chars → 422)
      - id: W3
        priority: HIGH
        match: ["mass assignment", "status", "suspended", "status=suspended", "permits :status"]
        description: wallet_params permits :status — clients can create suspended/closed wallets
      - id: W4
        priority: HIGH
        match: ["missing token", "no auth", "401", "Authorization"]
        description: No auth test (missing token → 401)
      - id: W5
        priority: MEDIUM
        match: ["response field", "balance", "status", "happy path"]
        description: Happy path response-body assertions incomplete or thin
      - id: W6
        priority: MEDIUM
        match: ["default balance", "balance: 0", "default: 0", "set_default_balance"]
        description: No test that created wallet has balance=0 default
      - id: W7
        priority: MEDIUM
        match: ["currency enum", "GBP", "BTC", "ETH", "inclusion"]
        description: Only one invalid currency tested; enum exhaustion missing
      - id: W8
        priority: MEDIUM
        match: ["audit trail", "audit log"]
        description: No audit trail fields
      - id: W9
        priority: MEDIUM
        match: ["rate limit", "throttle"]
        description: No rate limiting

  patch-api-v1-wallets:
    source_file: app/controllers/api/v1/wallets_controller.rb
    method: update
    critical: true
    gaps:
      - id: P1
        priority: HIGH
        match: ["no tests", "no coverage", "entire endpoint", "PATCH", "happy path"]
        description: Endpoint has zero tests — no happy path, no error branches
      - id: P2
        priority: HIGH
        match: ["data leak", "balance", "user_id", "leaks"]
        description: 422 response leaks balance, user_id, wallet_id (error body)
      - id: P3
        priority: HIGH
        match: ["IDOR", "another user", "other user", "cross-tenant"]
        description: IDOR — no test that other-user's wallet id returns 404 (current_user.wallets.find)
      - id: P4
        priority: HIGH
        match: ["mass assignment", "status", "permits :status", "transition"]
        description: Update permits :status — clients can transition wallets to suspended/closed
      - id: P5
        priority: HIGH
        match: ["missing token", "no auth", "401"]
        description: No auth test (missing token → 401)
      - id: P6
        priority: MEDIUM
        match: ["duplicate currency", "uniqueness", "currency change"]
        description: No test for changing currency to one the user already owns (uniqueness conflict)
      - id: P7
        priority: MEDIUM
        match: ["404", "not found", "missing wallet"]
        description: No test for wallet-not-found 404 response
      - id: P8
        priority: MEDIUM
        match: ["name too long", "length", "maximum: 100"]
        description: No test for updating name beyond 100-char max
      - id: P9
        priority: MEDIUM
        match: ["audit trail", "audit log"]
        description: No audit log on wallet status transitions
      - id: P10
        priority: HIGH
        match: ["concurrent", "race condition", "TOCTOU"]
        description: No concurrent-update test (balance can drift while update in flight)
      - id: P11
        priority: MEDIUM
        match: ["response field", "balance", "status", "name"]
        description: Success response body fields not asserted (no test exists yet)
      - id: P12
        priority: MEDIUM
        match: ["idempotency", "idempotent"]
        description: No idempotency on PATCH retries (network-level)

  get-api-v1-transactions:
    source_file: app/controllers/api/v1/transactions_controller.rb
    method: index
    critical: false
    gaps:
      - id: L1
        priority: HIGH
        match: ["response field", "response body", "shape", "transactions array"]
        description: Response body shape not asserted (array items, field set)
      - id: L2
        priority: HIGH
        match: ["IDOR", "another user", "other user", "current_user", "cross-tenant"]
        description: IDOR — no test that other-user's transactions are excluded from the list
      - id: L3
        priority: HIGH
        match: ["pagination", "page", "per_page", "meta"]
        description: Pagination (page, per_page, meta.total) not tested
      - id: L4
        priority: MEDIUM
        match: ["pagination", "page=0", "page=-1", "negative page", "per_page=0"]
        description: Pagination boundary inputs (page=0, page=-1, per_page too large) untested
      - id: L5
        priority: MEDIUM
        match: ["ordering", "created_at", "desc", "order"]
        description: Ordering (created_at DESC) not asserted
      - id: L6
        priority: HIGH
        match: ["start_date", "end_date", "date filter", "date range"]
        description: Date range filters not tested (start_date, end_date)
      - id: L7
        priority: MEDIUM
        match: ["invalid date", "malformed date", "Time.zone.parse", "date format"]
        description: Invalid date format for start_date/end_date not tested
      - id: L8
        priority: MEDIUM
        match: ["status filter", "status=pending", "filter by status"]
        description: Status filter not tested
      - id: L9
        priority: MEDIUM
        match: ["empty", "no transactions", "empty list"]
        description: Empty result set not tested
      - id: L10
        priority: HIGH
        match: ["missing token", "no auth", "401"]
        description: No auth test (missing token → 401)
      - id: L11
        priority: MEDIUM
        match: ["N+1", "includes", "wallet", "eager loading"]
        description: N+1 guard on includes(:wallet) not tested
      - id: L12
        priority: MEDIUM
        match: ["rate limit", "throttle"]
        description: No rate limiting

  get-api-v1-transactions-id:
    source_file: app/controllers/api/v1/transactions_controller.rb
    method: show
    critical: false
    gaps:
      - id: S1
        priority: HIGH
        match: ["response field", "response body", "shape", "assertion"]
        description: Response body shape not asserted (existing test only checks status)
      - id: S2
        priority: HIGH
        match: ["IDOR", "another user", "other user", "cross-tenant"]
        description: IDOR — no test for transaction belonging to another user (should 404)
      - id: S3
        priority: HIGH
        match: ["missing token", "no auth", "401"]
        description: No auth test (missing token → 401)
      - id: S4
        priority: MEDIUM
        match: ["amount", "currency", "status", "description", "category", "wallet_id", "created_at", "updated_at"]
        description: Individual response fields (amount, currency, status, description, category, wallet_id, timestamps) not asserted
      - id: S5
        priority: MEDIUM
        match: ["invalid id", "non-numeric", "malformed id"]
        description: Invalid / non-numeric id handling not tested
      - id: S6
        priority: MEDIUM
        match: ["data leak", "leak", "sensitive"]
        description: 404 response shape not asserted — error body could leak details
      - id: S7
        priority: MEDIUM
        match: ["iso8601", "timestamp format", "datetime"]
        description: Timestamp serialisation format (iso8601) not asserted
      - id: S8
        priority: MEDIUM
        match: ["audit trail", "audit log", "access log"]
        description: No audit log on transaction reads
